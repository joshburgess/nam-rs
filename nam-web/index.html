<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAM Web — Neural Amp Modeler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      color: #fff;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 1rem;
    }

    label.file-label {
      display: block;
      padding: 0.8rem 1rem;
      background: #0f3460;
      border: 2px dashed #1a5276;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 0.8rem;
    }

    label.file-label:hover {
      border-color: #e94560;
      background: #1a2a4a;
    }

    label.file-label input {
      display: none;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: #0f3460;
      color: #e0e0e0;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) {
      background: #e94560;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.active {
      background: #e94560;
    }

    #status {
      margin-top: 1.5rem;
      padding: 0.8rem 1rem;
      background: #0a0a1a;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    #status.error {
      color: #e94560;
      border: 1px solid #e94560;
    }

    #model-info {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>NAM Web</h1>
  <p class="subtitle">Neural Amp Modeler in the browser via Rust + WebAssembly</p>

  <div class="card">
    <h2>1. Load Model</h2>
    <label class="file-label">
      Choose .nam file
      <input type="file" id="model-input" accept=".nam">
    </label>
  </div>

  <div class="card">
    <h2>2. Audio Input</h2>
    <label class="file-label">
      Play audio file
      <input type="file" id="audio-input" accept=".wav,.mp3,.ogg,.flac" disabled>
    </label>
    <button id="mic-toggle" disabled>Enable Mic</button>
  </div>

  <div id="status">Load a .nam model to begin.</div>
  <div id="model-info"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
