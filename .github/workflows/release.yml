name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml's target-cpu=native so release binaries run on
  # any x86_64 CPU, not just the GitHub runner's. Use RUSTFLAGS (higher Cargo
  # precedence) rather than CARGO_BUILD_RUSTFLAGS so build.rustflags is fully
  # replaced, not merged.
  RUSTFLAGS: "-C llvm-args=--fp-contract=fast"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            trainer_bin: nam-trainer
          - os: windows-latest
            platform: windows-x86_64
            trainer_bin: nam-trainer.exe
          # Pin to 22.04 (glibc 2.35) instead of ubuntu-latest (24.04, glibc
          # 2.39) so the binary runs on Debian bookworm, RHEL 9, and older
          # LTS Ubuntus without hitting GLIBC_2.38-not-found errors.
          - os: ubuntu-22.04
            platform: linux-x86_64
            trainer_bin: nam-trainer
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libx11-xcb-dev libgl-dev libxcursor-dev libxrandr-dev libxi-dev libxinerama-dev libwayland-dev libxkbcommon-dev xvfb

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Bundle plugin
        run: cargo xtask bundle nam-plugin --release

      - name: Build trainer
        run: cargo build --release -p nam-trainer

      # Smoke test: launch the trainer binary, wait 5 seconds, and verify it's
      # still alive. Catches crashes on startup (SIGILL from bad codegen,
      # missing dynamic libraries, panic during eframe::run_native, config
      # path crashes, etc). macOS is skipped because the GitHub-hosted macOS
      # runner has no login session with WindowServer access, so AppKit
      # can't initialize.
      - name: Smoke test trainer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          xvfb-run -a bash -c '
            ./target/release/${{ matrix.trainer_bin }} &
            pid=$!
            sleep 5
            if kill -0 $pid 2>/dev/null; then
              kill $pid
              echo "Trainer stayed alive for 5s"
              exit 0
            fi
            echo "Trainer died before 5s"
            wait $pid
            exit 1
          '

      - name: Smoke test trainer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "target/release/${{ matrix.trainer_bin }}" -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            Write-Host "Trainer died before 5s (exit code $($proc.ExitCode))"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force
          Write-Host "Trainer stayed alive for 5s"

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-staging
          cp "target/release/${{ matrix.trainer_bin }}" "release-staging/nam-trainer-${{ matrix.platform }}"
          cd target/bundled
          for plugin in *.clap *.vst3; do
            [ -e "$plugin" ] || continue
            ext="${plugin##*.}"
            zip -r "../../release-staging/nam-plugin-${{ matrix.platform }}-${ext}.zip" "$plugin"
          done

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-staging | Out-Null
          Copy-Item "target/release/${{ matrix.trainer_bin }}" "release-staging/nam-trainer-${{ matrix.platform }}.exe"
          Compress-Archive -Path "target/bundled/nam-plugin.clap" -DestinationPath "release-staging/nam-plugin-${{ matrix.platform }}-clap.zip" -Force
          Compress-Archive -Path "target/bundled/nam-plugin.vst3" -DestinationPath "release-staging/nam-plugin-${{ matrix.platform }}-vst3.zip" -Force

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-staging/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --prerelease \
            --generate-notes \
            artifacts/*
